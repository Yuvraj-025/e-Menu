<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Menu Test</title>
<style>
  body{font-family:Arial;margin:20px}
  .filters{display:flex;gap:8px;margin-bottom:16px}
  .filter-btn{padding:8px 12px;border:1px solid #ccc;background:#fff;cursor:pointer}
  .filter-btn.active{background:#333;color:#fff}
  .menu-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .menu-item{border:1px solid #ddd;padding:12px;border-radius:6px}
  .cart-btn{position:fixed;right:20px;top:20px;padding:10px 12px;border-radius:6px;background:#111;color:#fff}
  .cart-panel{position:fixed;right:20px;top:60px;width:260px;border:1px solid #ccc;background:#fff;padding:12px;display:none}
  .cart-panel.open{display:block}
  .cart-list{list-style:none;padding:0;margin:0 0 8px 0}
  .qty-controls{display:flex;gap:6px;align-items:center}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:30px;background:#222;color:#fff;padding:8px 12px;border-radius:6px;opacity:0;transition:opacity .25s}
  .toast.show{opacity:1}
</style>
</head>
<body>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="coffee">Coffee</button>
  <button class="filter-btn" data-filter="breakfast">Breakfast</button>
  <button class="filter-btn" data-filter="restaurant">Restaurant</button>
</div>

<div class="menu-container"></div>

<button class="cart-btn" id="cart-toggle">Cart (<span class="cart-count">0</span>)</button>

<div class="cart-panel" id="cart-panel" role="dialog" aria-label="Cart">
  <h4>Your Cart</h4>
  <ul class="cart-list"></ul>
  <div class="cart-empty">Cart is empty</div>
  <div class="cart-total">Total: $0.00</div>
  <button class="cart-clear">Clear</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const menuData = [
    { name: "Espresso", description: "Strong coffee", price: 2.5, category: "coffee", image: "" },
    { name: "Latte", description: "Milky coffee", price: 3.5, category: "coffee", image: "" },
    { name: "Pancakes", description: "Fluffy", price: 5.0, category: "breakfast", image: "" },
    { name: "Omelette", description: "Cheese omelette", price: 4.5, category: "breakfast", image: "" },
    { name: "Club Sandwich", description: "Grilled sandwich", price: 6.0, category: "restaurant", image: "" }
  ];

  const menuContainer = document.querySelector('.menu-container');
  const filterButtons = document.querySelectorAll('.filter-btn');
  const cartToggle = document.getElementById('cart-toggle');
  const cartPanel = document.getElementById('cart-panel');
  const cartList = document.querySelector('.cart-list');
  const cartEmpty = document.querySelector('.cart-empty');
  const cartTotal = document.querySelector('.cart-total');
  const cartClear = document.querySelector('.cart-clear');
  const cartCountEl = document.querySelector('.cart-count');

  const cart = {}; 

  function showToast(msg){
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(()=>t.classList.add('show'));
    setTimeout(()=>{ t.classList.remove('show'); t.addEventListener('transitionend', ()=>t.remove(), {once:true}); }, 1600);
  }

  function renderMenu(items){
    menuContainer.innerHTML = '';
    items.forEach(item=>{
      const div = document.createElement('div');
      div.className = 'menu-item';
      div.innerHTML = `
        <h3>${item.name}</h3>
        <p>${item.description}</p>
        <div>Price: $${item.price.toFixed(2)}</div>
        <div style="margin-top:8px"><button class="add-to-cart-btn">Add</button></div>
      `;
      menuContainer.appendChild(div);
      div.querySelector('.add-to-cart-btn').addEventListener('click', ()=>{
        addToCart(item);
        showToast(item.name + ' added');
      });
    });
  }

  function addToCart(item){
    if(!cart[item.name]) cart[item.name] = {...item, quantity:1};
    else cart[item.name].quantity++;
    updateCartDisplay();
  }

  function updateCartDisplay(){
    cartList.innerHTML = '';
    const items = Object.values(cart);
    if(items.length === 0){
      cartEmpty.style.display = 'block';
      cartTotal.textContent = 'Total: $0.00';
      cartCountEl.textContent = '0';
      return;
    }
    cartEmpty.style.display = 'none';
    let total = 0, count = 0;
    items.forEach(it=>{
      const li = document.createElement('li');
      li.innerHTML = `${it.name} × ${it.quantity} - $${(it.price*it.quantity).toFixed(2)}`;
      cartList.appendChild(li);
      total += it.price * it.quantity;
      count += it.quantity;
    });
    cartTotal.textContent = 'Total: $' + total.toFixed(2);
    cartCountEl.textContent = count;
  }

  renderMenu(menuData);

  filterButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      filterButtons.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.filter;
      const filtered = filter === 'all' ? menuData : menuData.filter(i => i.category === filter);
      renderMenu(filtered);
    });
  });

  cartToggle.addEventListener('click', (e) => {
    cartPanel.classList.toggle('open');
  });
  cartClear.addEventListener('click', ()=>{
    for(const k in cart) delete cart[k];
    updateCartDisplay();
  });
});
</script>
</body>
</html>
