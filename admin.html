<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: Arial; padding: 20px; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f4f4f4; }
    input[type="text"], input[type="number"] { width: 100%; padding: 5px; }
    button { padding: 6px 12px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; }
    button.save { background: #4CAF50; color: white; }
    button.delete { background: #e74c3c; color: white; }
    button.add { background: #3498db; color: white; }
  </style>
</head>
<body>
  <h1>🍽 Admin Menu Management</h1>

  <table id="menuTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Description</th>
        <th>Price ($)</th>
        <th>Image Path</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <button class="add" id="addRow">+ Add New Dish</button>
  <button class="save" id="saveMenu">💾 Save Changes</button>

  <script src="admin.js"></script>
</body>
</html>
